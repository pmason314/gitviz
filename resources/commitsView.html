<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline';">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--vscode-font-family);
  font-size: var(--vscode-font-size);
  color: var(--vscode-foreground);
  background: transparent;
  overflow-x: clip;}
.search-wrap {
  padding: 5px 8px 3px;
  position: sticky;
  top: 0;
  background: var(--vscode-sideBar-background, var(--vscode-editor-background));
  z-index: 10;
}
.search-row {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--vscode-input-background);
  border: 1px solid var(--vscode-input-border, transparent);
  border-radius: 2px;
  padding: 0 7px;
  height: 24px;
}
.search-row:focus-within { border-color: var(--vscode-focusBorder); }
.s-icon { flex-shrink: 0; opacity: 0.5; width: 13px; height: 13px; }
.s-input {
  flex: 1; min-width: 0;
  background: transparent; border: none; outline: none;
  color: var(--vscode-input-foreground);
  font: inherit;
}
.s-input::placeholder { color: var(--vscode-input-placeholderForeground); opacity: 1; }
.s-clear {
  display: none; flex-shrink: 0; align-items: center; justify-content: center;
  cursor: pointer; background: none; border: none;
  color: var(--vscode-icon-foreground, var(--vscode-foreground));
  opacity: 0.6; padding: 0; font-size: 12px; line-height: 1; width: 14px; height: 14px;
}
.s-clear:hover { opacity: 1; }
.row {
  position: relative;
  display: flex; align-items: center;
  padding: 1px 20px 1px 20px;
  min-height: 22px;
  cursor: pointer; gap: 0;
}
.row:hover { background: var(--vscode-list-hoverBackground); }
.msg {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex-shrink: 1; min-width: 0;
}
.date-first {
  flex: 0 0 auto;
  color: var(--vscode-descriptionForeground);
  font-size: 0.9em;
  margin-left: 6px;
  white-space: nowrap;
}
.auth-rest {
  flex: 0 9999 auto; min-width: 0;
  color: var(--vscode-descriptionForeground);
  font-size: 0.9em;
  white-space: nowrap; overflow: hidden;
}
.copy-btn, .graph-btn {
  display: none; align-items: center; justify-content: center;
  background: none; border: none;
  color: var(--vscode-icon-foreground, var(--vscode-foreground));
  opacity: 0.55; cursor: pointer; padding: 2px; border-radius: 3px;
  margin-left: 4px; flex-shrink: 0;
}
.graph-btn { margin-left: 0; margin-right: 4px; }
.copy-btn { padding-right: 0; }
.row:hover .copy-btn, .row:hover .graph-btn { display: flex; }
.copy-btn:hover, .graph-btn:hover { opacity: 1; background: var(--vscode-toolbar-hoverBackground); }
.empty { padding: 6px 20px; color: var(--vscode-descriptionForeground); font-size: 0.9em; }
#vtip { display: none; position: fixed; background: var(--vscode-editorHoverWidget-background); border: 1px solid var(--vscode-editorHoverWidget-border); color: var(--vscode-editorHoverWidget-foreground); padding: 2px 6px; font-size: 0.85em; white-space: nowrap; pointer-events: none; z-index: 1000; box-shadow: 0 2px 8px var(--vscode-widget-shadow, rgba(0,0,0,0.36)); }
#tip {
  display: none;
  position: fixed;
  background: var(--vscode-editorHoverWidget-background);
  border: 1px solid var(--vscode-editorHoverWidget-border);
  color: var(--vscode-editorHoverWidget-foreground);
  padding: 3px 8px;
  max-width: calc(100vw - 16px);
  font-size: 0.9em; line-height: 1.4;
  white-space: normal; overflow-wrap: break-word;
  box-shadow: 0 2px 8px var(--vscode-widget-shadow, rgba(0,0,0,0.36));
  pointer-events: none;
  z-index: 100;
}
.tip-meta { font-size: 0.85em; opacity: 0.8; margin-top: 2px; }
.tip-sha { font-family: var(--vscode-editor-font-family, monospace); }
.tip-tag { color: var(--vscode-editorWarning-foreground, rgba(200,140,0,0.9)); }
#suggest {
  display: none;
  position: sticky;
  top: 34px;
  z-index: 20;
  background: var(--vscode-editorWidget-background, var(--vscode-editor-background));
  border: 1px solid var(--vscode-editorWidget-border, var(--vscode-focusBorder));
  border-top: none;
  max-height: 160px;
  overflow-y: auto;
}
.sg-item {
  padding: 2px 12px;
  min-height: 22px;
  line-height: 22px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sg-item:hover, .sg-item.active { background: var(--vscode-list-hoverBackground); }
.tag-pill {
  display: inline-block;
  flex-shrink: 0;
  margin-left: 5px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 0.78em;
  line-height: 1.5;
  background: var(--vscode-badge-background);
  color: var(--vscode-badge-foreground);
  white-space: nowrap;
  vertical-align: middle;
  cursor: pointer;
}
.tag-pill.tag-local {
  background: rgba(200, 140, 0, 0.22);
  color: var(--vscode-foreground);
  border: 1px solid rgba(200, 140, 0, 0.45);
}
.tag-pill.tag-synced {
  background: rgba(0, 150, 100, 0.18);
  color: var(--vscode-foreground);
  border: 1px solid rgba(0, 150, 100, 0.38);
}
.ctx-menu {
  display: none;
  position: fixed;
  background: var(--vscode-menu-background, var(--vscode-editorWidget-background));
  border: 1px solid var(--vscode-menu-border, var(--vscode-widget-border));
  color: var(--vscode-menu-foreground, var(--vscode-foreground));
  padding: 4px 0;
  min-width: 170px;
  z-index: 500;
  box-shadow: 0 4px 12px var(--vscode-widget-shadow, rgba(0,0,0,0.4));
}
.ctx-item {
  padding: 3px 14px;
  min-height: 22px;
  line-height: 22px;
  cursor: pointer;
  font-size: 0.95em;
  white-space: nowrap;
}
.ctx-item:hover { background: var(--vscode-menu-selectionBackground); color: var(--vscode-menu-selectionForeground); }
.ctx-sep { border: none; border-top: 1px solid var(--vscode-menu-separatorBackground, var(--vscode-widget-border)); margin: 3px 0; }
.ctx-del { color: var(--vscode-errorForeground); }
</style>
</head>
<body>
<div class="search-wrap">
  <div class="search-row">
    <svg class="s-icon" viewBox="0 0 16 16" fill="currentColor">
      <path d="M6.5 1a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11zm-4.5 5.5a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zm11.854 7.354-3-3-.708.708 3 3 .708-.708z"/>
    </svg>
    <input class="s-input" id="f" type="text" placeholder="Filter by message, SHA, or @author&#x2026;" autocomplete="off" spellcheck="false"/>
    <button class="s-clear" id="c" data-vtip="Clear filter">&#x2715;</button>
  </div>
</div>
<div id="suggest"></div>
<div id="list"></div>
<div id="ctx" class="ctx-menu"></div>
<div id="tip"></div>
<div id="vtip"></div>
<script>
var vsc = acquireVsCodeApi();
var inp = document.getElementById('f');
var clr = document.getElementById('c');
var lst = document.getElementById('list');
var sug = document.getElementById('suggest');
var tip = document.getElementById('tip');
var tipTimer;
var allCommits = [];
var allAuthors = [];
var allTags = []; // [{sha, name}]
var tagsBySha = {}; // sha -> [name,...]
var tagStatus = {}; // name -> 'unknown'|'local'|'synced'
var tagsOnly = false;
var activeIdx = -1;

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var copySvg = '<svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">'
  + '<path d="M4 4v-3h9v11h-3v1h-9v-11h3zm1 0h5v9h2v-9h-7v0zm-1 1h-2v9h7v-9h-5z"/>'
  + '</svg>';
var graphSvg = '<svg viewBox="0 0 16 16" fill="currentColor" width="14" height="14">'
  + '<circle cx="3" cy="3" r="2"/>'
  + '<circle cx="3" cy="13" r="2"/>'
  + '<circle cx="13" cy="8" r="2"/>'
  + '<line x1="3" y1="5" x2="3" y2="11" stroke="currentColor" stroke-width="1.5"/>'
  + '<line x1="5" y1="3" x2="11" y2="7" stroke="currentColor" stroke-width="1.5"/>'
  + '<line x1="5" y1="13" x2="11" y2="9" stroke="currentColor" stroke-width="1.5"/>'
  + '</svg>';
var tagSvg = '<svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">'
  + '<path fill-rule="evenodd" clip-rule="evenodd" d="M12.4799 1H5.47991L0.979912 6.07L7.63991 12.73L13.9199 6.45L13.9499 6.28L12.9999 1.55L12.4799 1ZM12.0899 2L12.9299 6.08L7.63991 11.37L2.39991 6.13L6.35991 2H12.0899ZM10.5 6C11.3284 6 12 5.32843 12 4.5C12 3.67157 11.3284 3 10.5 3C9.67157 3 9 3.67157 9 4.5C9 5.32843 9.67157 6 10.5 6Z"/>'
  + '</svg>';
var tagDeleteSvg = '<svg viewBox="0 0 16 16" fill="currentColor" width="12" height="12">'
  + '<path fill-rule="evenodd" clip-rule="evenodd" d="M12.4799 1H5.47991L0.979912 6.07L7.63991 12.73L13.9199 6.45L13.9499 6.28L12.9999 1.55L12.4799 1ZM12.0899 2L12.9299 6.08L7.63991 11.37L2.39991 6.13L6.35991 2H12.0899ZM10.5 6C11.3284 6 12 5.32843 12 4.5C12 3.67157 11.3284 3 10.5 3C9.67157 3 9 3.67157 9 4.5C9 5.32843 9.67157 6 10.5 6Z"/>'
  + '<line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>'
  + '</svg>';

function showSuggest(matches) {
  if (!matches.length) { hideSuggest(); return; }
  activeIdx = -1;
  sug.innerHTML = matches.map(function(n, i) {
    return '<div class="sg-item" data-idx="' + i + '" data-name="' + esc(n) + '">@' + esc(n) + '</div>';
  }).join('');
  sug.style.display = 'block';
}

function hideSuggest() {
  sug.style.display = 'none';
  sug.innerHTML = '';
  activeIdx = -1;
}

function applySuggestion(name) {
  inp.value = '@' + name;
  clr.style.display = 'flex';
  hideSuggest();
  render();
  inp.focus();
}

function render() {
  var raw = inp.value;
  var q = raw.toLowerCase().trim();
  var shown;
  if (q.startsWith('@')) {
    var afterAt = q.slice(1);
    var matchedAuthor = '';
    for (var ai = 0; ai < allAuthors.length; ai++) {
      var aLower = allAuthors[ai].toLowerCase();
      if (afterAt.startsWith(aLower) && aLower.length > matchedAuthor.length) {
        matchedAuthor = aLower;
      }
    }
    var aq, mq;
    if (matchedAuthor) {
      aq = matchedAuthor;
      mq = afterAt.slice(matchedAuthor.length).trim();
    } else {
      aq = afterAt;
      mq = '';
    }
    var mqWords = mq.split(/\s+/).filter(Boolean);
    shown = allCommits.filter(function(c) {
      var authorMatch = !aq || (c.author && c.author.toLowerCase().indexOf(aq) >= 0);
      var msgMatch = mqWords.length === 0 || mqWords.every(function(w) {
        return c.message.toLowerCase().indexOf(w) >= 0;
      });
      return authorMatch && msgMatch;
    });
  } else {
    shown = q
      ? allCommits.filter(function(c) {
          return c.message.toLowerCase().indexOf(q) >= 0
            || (c.author && c.author.toLowerCase().indexOf(q) >= 0)
            || c.sha.indexOf(q) >= 0;
        })
      : allCommits;
  }
  if (tagsOnly) {
    shown = shown.filter(function(c) { return tagsBySha[c.sha] && tagsBySha[c.sha].length > 0; });
  }

  if (!shown.length) {
    lst.innerHTML = '<div class="empty">' + esc(tagsOnly ? 'No tagged commits' : (q ? 'No commits matching "' + q + '"' : 'No commits')) + '</div>';
    return;
  }

  lst.innerHTML = shown.map(function(c) {
    var rawRest = (c.author && c.shortAuthor && c.author.length > c.shortAuthor.length)
      ? c.author.slice(c.shortAuthor.length).trimStart()
      : '';
    var authRest = rawRest ? '\u00a0' + rawRest : '';
    var dateFirst = (c.shortDate || '') + (c.shortAuthor ? (c.shortDate ? ' \u00b7 ' : '') + c.shortAuthor : '');
    var tagNames = tagsBySha[c.sha] || [];
    var pillsHtml = tagNames.map(function(n) {
      var st = tagStatus[n] || 'unknown';
      var cls = 'tag-pill' + (st === 'local' ? ' tag-local' : st === 'synced' ? ' tag-synced' : '');
      var pillTip = st === 'local' ? 'Local tag \u2014 not pushed to remote'
                  : st === 'synced' ? 'Tag synced with remote'
                  : 'Tag';
      return '<span class="' + cls + '" data-tag="' + esc(n) + '" data-vtip="' + esc(pillTip) + '">' + esc(n) + '</span>';
    }).join('');
    return '<div class="row" data-sha="' + esc(c.sha) + '" data-tooltip="' + esc(c.message) + '" data-date="' + esc(c.relativeDate || '') + '" data-author="' + esc(c.author || '') + '">'
      + '<button class="graph-btn" data-sha="' + esc(c.sha) + '" data-vtip="Open in Commit Graph">' + graphSvg + '</button>'
      + '<span class="msg">' + esc(c.message) + '</span>'
      + pillsHtml
      + (dateFirst ? '<span class="date-first">' + esc(dateFirst) + '</span>' : '')
      + (authRest ? '<span class="auth-rest">' + esc(authRest) + '</span>' : '')
      + '<button class="copy-btn" data-sha="' + esc(c.sha) + '" data-vtip="Copy SHA">' + copySvg + '</button>'
      + '</div>';
  }).join('');
}

lst.addEventListener('click', function(e) {
  var btn = e.target.closest('.copy-btn');
  if (btn) { e.stopPropagation(); vsc.postMessage({type:'copySha', sha: btn.dataset.sha}); return; }
  var gbtn = e.target.closest('.graph-btn');
  if (gbtn) { e.stopPropagation(); vsc.postMessage({type:'openGraph', sha: gbtn.dataset.sha}); return; }
  var row = e.target.closest('.row');
  if (row) { vsc.postMessage({type:'openCommitDetails', sha: row.dataset.sha}); }
});

var ctx = document.getElementById('ctx');
var ctxSha = '';
function showCtx(x, y, sha) {
  ctxSha = sha;
  var tagNames = tagsBySha[sha] || [];
  var deleteItems = tagNames.map(function(n) {
    return '<div class="ctx-item" data-action="deleteTag" data-name="' + esc(n) + '">'
      + tagDeleteSvg + '\u00a0Delete Tag \u201c' + esc(n) + '\u201d</div>';
  }).join('');
  ctx.innerHTML = '<div class="ctx-item" data-action="openCommitDetails">Open Commit Details</div>'
    + '<div class="ctx-item" data-action="openGraph">Open in Commit Graph</div>'
    + '<div class="ctx-item" data-action="copySha">Copy SHA</div>'
    + '<hr class="ctx-sep">'
    + '<div class="ctx-item" data-action="createTag">' + tagSvg + '\u00a0Create Tag Here\u2026</div>'
    + deleteItems;
  ctx.style.display = 'block';
  ctx.style.left = x + 'px';
  ctx.style.top = y + 'px';
  var cr = ctx.getBoundingClientRect();
  if (cr.bottom > window.innerHeight - 4) { ctx.style.top = Math.max(4, y - cr.height) + 'px'; }
  if (cr.right > window.innerWidth - 4) { ctx.style.left = Math.max(4, window.innerWidth - cr.width - 4) + 'px'; }
}
function hideCtx() { ctx.style.display = 'none'; ctxSha = ''; }

lst.addEventListener('contextmenu', function(e) {
  var row = e.target.closest('.row');
  if (!row) { return; }
  e.preventDefault();
  showCtx(e.clientX, e.clientY, row.dataset.sha);
});

ctx.addEventListener('mousedown', function(e) {
  var item = e.target.closest('[data-action]');
  if (!item) { return; }
  e.stopPropagation();
  var action = item.dataset.action;
  var sha = ctxSha;
  hideCtx();
  if (action === 'openCommitDetails') { vsc.postMessage({type:'openCommitDetails', sha: sha}); }
  else if (action === 'openGraph')    { vsc.postMessage({type:'openGraph', sha: sha}); }
  else if (action === 'copySha')      { vsc.postMessage({type:'copySha', sha: sha}); }
  else if (action === 'createTag')    { vsc.postMessage({type:'requestCreateTag', sha: sha}); }
  else if (action === 'deleteTag')    { vsc.postMessage({type:'requestDeleteTag', name: item.dataset.name}); }
});

document.addEventListener('mousedown', function(e) {
  if (!ctx.contains(e.target)) { hideCtx(); }
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { hideCtx(); }
});

lst.addEventListener('mouseover', function(e) {
  var row = e.target.closest('.row');
  if (!row) { return; }
  // Don't show commit tooltip when hovering icon buttons or tag pills (they show their own vtip)
  if (e.target.closest('.copy-btn, .graph-btn, .tag-pill')) {
    clearTimeout(tipTimer);
    tip.style.display = 'none';
    return;
  }
  clearTimeout(tipTimer);
  tipTimer = setTimeout(function() {
    if (!row.dataset.tooltip) { return; }
    var sha7 = row.dataset.sha ? row.dataset.sha.slice(0, 7) : '';
    var date = row.dataset.date || '';
    var author = row.dataset.author || '';
    var rowTags = tagsBySha[row.dataset.sha] || [];
    var tagSpans = rowTags.map(function(t) { return '<span class="tip-tag">' + esc(t) + '</span>'; });
    var shaSpan = sha7 ? '<span class="tip-sha">' + esc(sha7) + '</span>' : '';
    var plainParts = [date, author].filter(Boolean).map(esc);
    var allParts = tagSpans.concat(shaSpan ? [shaSpan] : []).concat(plainParts);
    var rect = row.getBoundingClientRect();
    tip.innerHTML = '<div>' + esc(row.dataset.tooltip || '') + '</div>'
      + '<div class="tip-meta">'
      + allParts.join('\u00a0\u00b7\u00a0')
      + '</div>';
    tip.style.display = 'block';
    tip.style.left = rect.left + 'px';
    tip.style.top = (rect.bottom + 2) + 'px';
    var tr = tip.getBoundingClientRect();
    if (tr.bottom > window.innerHeight - 4) { tip.style.top = Math.max(4, rect.top - tr.height - 2) + 'px'; }
    if (tr.right  > window.innerWidth  - 4) { tip.style.left = Math.max(4, window.innerWidth - tr.width - 8) + 'px'; }
  }, 600);
});

lst.addEventListener('mouseout', function(e) {
  if (!e.target.closest('.row')) { return; }
  clearTimeout(tipTimer);
  tip.style.display = 'none';
});

inp.addEventListener('input', function() {
  clr.style.display = inp.value ? 'flex' : 'none';
  var raw = inp.value;
  if (raw === '@' || (raw.startsWith('@') && !raw.includes(' '))) {
    var term = raw.slice(1).toLowerCase();
    var matches = term
      ? allAuthors.filter(function(n) { return n.toLowerCase().indexOf(term) >= 0; })
      : allAuthors.slice();
    showSuggest(matches);
  } else {
    hideSuggest();
  }
  render();
});

clr.addEventListener('click', function() {
  inp.value = ''; clr.style.display = 'none';
  hideSuggest();
  render();
  inp.focus();
});

inp.addEventListener('keydown', function(e) {
  if (sug.style.display === 'none') { return; }
  var items = sug.querySelectorAll('.sg-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (activeIdx > 0) { items[activeIdx].classList.remove('active'); }
    activeIdx = Math.min(activeIdx + 1, items.length - 1);
    items[activeIdx].classList.add('active');
    items[activeIdx].scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (activeIdx >= 0) { items[activeIdx].classList.remove('active'); }
    activeIdx = Math.max(activeIdx - 1, 0);
    items[activeIdx].classList.add('active');
    items[activeIdx].scrollIntoView({block:'nearest'});
  } else if (e.key === 'Enter' || e.key === 'Tab') {
    if (activeIdx >= 0) {
      e.preventDefault();
      applySuggestion(items[activeIdx].dataset.name);
    }
  } else if (e.key === 'Escape') {
    hideSuggest();
  }
});

sug.addEventListener('mousedown', function(e) {
  var item = e.target.closest('.sg-item');
  if (item) { e.preventDefault(); applySuggestion(item.dataset.name); }
});

window.addEventListener('message', function(e) {
  var msg = e.data;
  if (msg.type === 'update') {
    allCommits = msg.commits || [];
    render();
  } else if (msg.type === 'setFilter') {
    inp.value = msg.value || '';
    clr.style.display = inp.value ? 'flex' : 'none';
    hideSuggest();
    render();
    inp.focus();
  } else if (msg.type === 'setAuthors') {
    allAuthors = (msg.names || []).map(function(n) { return n.trim(); }).filter(Boolean);
  } else if (msg.type === 'setTags') {
    allTags = msg.tags || [];
    tagsBySha = {};
    tagStatus = {};
    allTags.forEach(function(t) {
      if (!tagsBySha[t.sha]) { tagsBySha[t.sha] = []; }
      tagsBySha[t.sha].push(t.name);
      tagStatus[t.name] = 'unknown';
    });
    render();
  } else if (msg.type === 'setTagStatus') {
    var remoteNames = msg.remoteNames || [];
    allTags.forEach(function(t) {
      tagStatus[t.name] = remoteNames.indexOf(t.name) >= 0 ? 'synced' : 'local';
    });
    render();
  } else if (msg.type === 'showTagsOnly') {
    tagsOnly = true;
    render();
  } else if (msg.type === 'showAllCommits') {
    tagsOnly = false;
    render();
  }
});
(function() {
  var vtip = document.getElementById('vtip');
  var vtipT;
  document.addEventListener('mouseover', function(e) {
    var el = e.target.closest('[data-vtip]');
    clearTimeout(vtipT);
    if (!el) { vtip.style.display = 'none'; return; }
    vtipT = setTimeout(function() {
      vtip.textContent = el.dataset.vtip;
      vtip.style.display = 'block';
      vtip.style.left = '0px'; // anchor at 0 to measure width cleanly
      var tr = vtip.getBoundingClientRect();
      var r = el.getBoundingClientRect();
      var left = Math.min(r.left, document.documentElement.clientWidth - tr.width - 4);
      vtip.style.left = Math.max(4, left) + 'px';
      var top = r.bottom + 4;
      if (top + tr.height > window.innerHeight - 4) { top = Math.max(4, r.top - tr.height - 4); }
      vtip.style.top = top + 'px';
    }, 500);
  });
  document.addEventListener('mouseout', function(e) {
    if (!e.target.closest('[data-vtip]')) { return; }
    clearTimeout(vtipT);
    vtip.style.display = 'none';
  });
})();
</script>
</body>
</html>
